name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build
        run: pnpm run build

  deploy-preview:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: docs-preview

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy preview Worker
        run: pnpm run deploy:preview-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAPYR_DOCS_R2_BUCKET: ${{ secrets.PAPYR_DOCS_R2_BUCKET }}
          PAPYR_DOCS_R2_PREVIEW_BUCKET: ${{ secrets.PAPYR_DOCS_R2_PREVIEW_BUCKET }}

      - name: Upload preview R2 artifacts
        run: pnpm run upload:r2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_UPLOAD_MODE: remote
          R2_UPLOAD_TARGET: preview
          PAPYR_DOCS_R2_BUCKET: ${{ secrets.PAPYR_DOCS_R2_BUCKET }}
          PAPYR_DOCS_R2_PREVIEW_BUCKET: ${{ secrets.PAPYR_DOCS_R2_PREVIEW_BUCKET }}

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: docs-production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy production Worker
        run: pnpm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAPYR_DOCS_R2_BUCKET: ${{ secrets.PAPYR_DOCS_R2_BUCKET }}
          PAPYR_DOCS_R2_PREVIEW_BUCKET: ${{ secrets.PAPYR_DOCS_R2_PREVIEW_BUCKET }}

      - name: Upload production R2 artifacts
        run: pnpm run upload:r2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_UPLOAD_MODE: remote
          R2_UPLOAD_TARGET: production
          PAPYR_DOCS_R2_BUCKET: ${{ secrets.PAPYR_DOCS_R2_BUCKET }}
          PAPYR_DOCS_R2_PREVIEW_BUCKET: ${{ secrets.PAPYR_DOCS_R2_PREVIEW_BUCKET }}
